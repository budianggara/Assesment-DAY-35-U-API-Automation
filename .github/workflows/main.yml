name: Java API Automation CI

on:
  push:
    branches: [ "main" ] # Berjalan otomatis saat ada push ke branch main
  pull_request:
    branches: [ "main" ] # Berjalan otomatis saat ada pull request ke branch main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Menggunakan server Linux Ubuntu

    steps:
    # 1. Mengambil kode terbaru dari repositori Anda
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Java JDK versi 17 (versi standar & stabil untuk Gradle baru)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Distribusi Java OpenJDK yang direkomendasikan

    # 3. Memberikan izin akses (permission) eksekusi untuk gradlew di server Linux
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 4. Menjalankan Automation Testing menggunakan Gradle
    - name: Run Automation Tests with Gradle
      run: ./gradlew test

    # 5. Menyimpan Laporan Hasil Test (Artifacts) agar bisa di-download setelah test selesai
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # Tetap membuat laporan meskipun ada test yang gagal
      with:
        name: gradle-test-report
        path: build/reports/tests/test/ # Lokasi standar laporan test HTML milik Gradle
